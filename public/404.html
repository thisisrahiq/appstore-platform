<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AppStore</title>
    <script>
      // GitHub Pages SPA redirect hack
      // When GitHub Pages serves a 404, this script redirects to index.html
      // while preserving the path as a query parameter, which index.html then
      // restores for the client-side router.
      var pathSegmentsToKeep = 1; // keep '/appstore-platform'
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/." +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
